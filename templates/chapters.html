<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ display_name(manga) }} — Chapters</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <a class="back" href="/manga">&larr; All Manga</a>
    <div class="manga-detail">
      {% if has_cover %}
      <img src="/cover/{{ manga }}" alt="{{ display_name(manga) }}" class="detail-cover">
      {% endif %}
      <h1>{{ display_name(manga) }}</h1>
    </div>
    {% if chapters %}
    <ul class="list">
      {% for ch in chapters %}
      <li class="chapter-item">
        <a href="/manga/{{ manga }}/{{ ch }}" class="{{ 'read' if ch in read else 'unread' }}">{{ chapter_label(manga, ch) }}</a>
        {% if ch in read %}<span class="read-badge">Read</span>{% endif %}
      </li>
      {% endfor %}
    </ul>
    {% else %}
    <p class="empty">No chapters found.</p>
    {% endif %}
  </div>
</body>
</html>
