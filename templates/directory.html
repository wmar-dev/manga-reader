<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>All Manga</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1>All Manga</h1>
      <a href="/" class="browse-link">Continue Reading</a>
    </div>
    {% if manga_list %}
    <ul class="manga-grid">
      {% for manga in manga_list %}
      <li>
        <a href="/manga/{{ manga }}" class="manga-card">
          {% if manga in covers %}
          <img src="/cover/{{ manga }}" alt="{{ display_name(manga) }}" class="manga-cover">
          {% else %}
          <div class="manga-cover manga-cover-placeholder"></div>
          {% endif %}
          <span class="manga-title">{{ display_name(manga) }}</span>
        </a>
      </li>
      {% endfor %}
    </ul>
    {% else %}
    <p class="empty">No manga found. Add zip files under <code>manga/{title}/{chapter}.zip</code>.</p>
    {% endif %}
  </div>
</body>
</html>
